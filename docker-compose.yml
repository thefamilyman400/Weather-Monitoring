version: "3.9"

services:
  app:
    build: .
    container_name: weather-app
    env_file:
      - .env
    restart: always

  nginx:
    image: nginx:latest
    container_name: weather-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    restart: always